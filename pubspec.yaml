name: yoda_res
description: Ýoda Restoran is an online food ordering and delivery platform.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 2.8.6+57

environment:
  sdk: ">=2.17.3 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2

  # STATE MANAGEMENT
  stacked: ^2.3.12
  stacked_services: ^0.9.1
  stacked_hooks: ^0.2.2

  # FIREBASE
  firebase_core: ^2.1.1
  firebase_messaging: ^14.0.3
  firebase_dynamic_links: ^5.0.3
  firebase_in_app_messaging: ^0.7.0+5

  # STORAGE
  shared_preferences: ^2.0.11

  # DB
  hive: ^2.0.5
  hive_flutter: ^1.1.0

  # TOOLS
  hive_generator: ^1.1.1
  package_info: ^2.0.2
  intl: ^0.17.0
  logger: ^1.1.0
  flutter_hooks: ^0.18.5+1
  url_launcher: ^6.1.6
  flutter_native_splash: ^2.2.16
  flutter_launcher_icons: ^0.9.2
  easy_localization: ^3.0.0
  upgrader: ^4.4.0 # For IOS only update feature
  in_app_update: ^3.0.0 # For ANDROID only update feature
  package_info_plus: ^1.3.0
  geolocator: ^8.1.1
  double_back_to_close_app: ^2.1.0
  flutter_html: ^2.2.1
  keframe: ^3.0.0 # Optimization component
  
  sentry_flutter: ^7.9.0

  # flutter_inappwebview: ^5.7.1+1
  flutter_inappwebview:
    git: 
      url: https://github.com/Ruslanbek0809/flutter_inappwebview.git  # To fix dependency issue
      ref: v5.7.1+1

  platform: ^3.1.0 # Native settings package
  bottom_sheet: ^3.1.2 # For custom bottom sheet
  share_plus: ^4.0.10
  collection: ^1.17.0
  # shake: ^2.1.0 # A flutter package to detect phone shakes
  # sms_autofill: ^2.2.0

  # DATA MODELS
  json_annotation: ^4.4.0

  # NETWORK
  dio: ^5.1.2
  native_dio_adapter: ^0.1.0
  connectivity_plus: ^2.2.0

  # UI
  flutter_screenutil: ^5.5.3+2
  carousel_slider: ^4.2.0
  flutter_svg: ^1.1.6
  mask_text_input_formatter: ^2.0.0
  flutter_datetime_picker: ^1.5.1
  pin_code_fields: ^8.0.1
  flutter_rating_bar: ^4.0.0
  lottie: ^1.2.1
  # pull_to_refresh: ^2.0.0
  pull_to_refresh_flutter3: ^2.0.1 # Temporary solution to make the package compatible with Flutter 3.0.0
  flutter_spinkit: ^5.1.0
  flash: ^2.0.3+3
  smooth_page_indicator: ^1.0.0+2
  shimmer: ^2.0.0
  flutter_slidable: ^1.2.0
  simple_shadow: ^0.3.0 # A customizable shadow for any widget
  # awesome_dialog: ^3.0.0
  timelines: ^0.1.0 # Order status flow
  flutter_credit_card: ^3.0.6
  auto_size_text: ^3.0.0
  story_view: ^0.15.0

  # device_preview: ^1.1.0
  responsive_builder: ^0.5.0+1
  colorful_safe_area: ^0.3.0

  scroll_to_index: ^3.0.1
  rect_getter: ^1.1.0

  # IMAGE
  cached_network_image: ^3.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.1.5
  stacked_generator: ^0.5.6
  json_serializable: ^6.1.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

dependency_overrides:
  flutter_svg: ^1.0.0 # To fix dependency issue between flutter_hmtl and flutter_svg

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter_native_splash:
  # background_image: "assets/splash.png"
  color: "#FFFFFF"

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/fonts/
    - assets/translations/
    
  fonts:
    - family: Segoe
      fonts:
        - asset: assets/fonts/SegoeUILight.ttf
          weight: 400
        - asset: assets/fonts/SegoeUIRegular.ttf
          weight: 500
        - asset: assets/fonts/SegoeUISemiBold.ttf
          weight: 600
        - asset: assets/fonts/SegoeUIBold.ttf
          weight: 700

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
